<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="udGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset=".5" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="udSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".26"/>
      <stop offset=".55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- gradient tile + soft top sheen -->
  <rect width="64" height="64" rx="16" fill="url(#udGrad)"/>
  <rect width="64" height="64" rx="16" fill="url(#udSheen)"/>

  <!-- UD monogram, tight modern kerning -->
  <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="27" font-weight="800"
        letter-spacing="-1" fill="#ffffff">UD</text>

  <!-- accent underline -->
  <rect x="25" y="47" width="14" height="3" rx="1.5" fill="#ffffff" fill-opacity=".85"/>
</svg>
